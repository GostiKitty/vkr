<text x="40" y="142" class="col">ВХОДНЫЕ ДАННЫЕ</text><text x="368" y="142" class="col">ПРЕПРОЦЕССИНГ</text><text x="716" y="142" class="col">СБОРКА</text><text x="1010" y="142" class="col">РАСЧЁТНЫЕ КОНТУРЫ</text><text x="1488" y="142" class="col">АНАЛИЗ</text><text x="1780" y="142" class="col">РЕЗУЛЬТАТЫ И ОЦЕНКА</text><rect x="40" y="172" width="280" height="126" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="52" y="196" style="font-size:16px;font-weight:700">BuildingModel</text><line x1="50" y1="206" x2="310" y2="206" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="52" y="225" class="ln">геометрия · проёмы · уровни</text><text x="52" y="245" class="ln">оборудование · инж. сети</text><text x="52" y="265" class="ln">пресеты ограждений / материалы</text><rect x="40" y="324" width="280" height="116" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="52" y="348" style="font-size:15.5px;font-weight:700">Сценарии</text><line x1="50" y1="358" x2="310" y2="358" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="52" y="377" class="ln">уставки, смещение setpoint</text><text x="52" y="397" class="ln">множители нагрузки / расхода</text><text x="52" y="417" class="ln">тариф, источник тепла</text><rect x="40" y="466" width="280" height="116" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="52" y="490" style="font-size:15.5px;font-weight:700">Климат</text><line x1="50" y1="500" x2="310" y2="500" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="52" y="519" class="ln">t_н, t_от, ГСОП, z_от</text><text x="52" y="539" class="ln">солнечная радиация I</text><text x="52" y="559" class="ln">СП 131 / СП 50 (города)</text><rect x="40" y="608" width="280" height="138" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="52" y="632" style="font-size:15.5px;font-weight:700">Нормы (таблицы)</text><line x1="50" y1="642" x2="310" y2="642" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="52" y="661" class="ln">СП 50: R_норм, q_быт, β, ξ</text><text x="52" y="681" class="ln">СП 230: ψ, χ мостов холода</text><text x="52" y="701" class="ln">табл. Г / Д коэффициенты</text><rect x="368" y="172" width="300" height="104" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="196" style="font-size:15.5px;font-weight:700">Граф смежности</text><line x1="378" y1="206" x2="658" y2="206" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="225" class="ln">внутр. / наружные рёбра</text><text x="380" y="245" class="ln">площади контактов L·H</text><rect x="368" y="296" width="300" height="122" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="320" style="font-size:15.5px;font-weight:700">Геометрия (BIM)</text><line x1="378" y1="330" x2="658" y2="330" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="349" class="ln">A = ½|Σ(xᵢyᵢ₊₁−xᵢ₊₁yᵢ)|</text><text x="380" y="369" class="ln">V = A·h, центроиды</text><text x="380" y="389" class="ln">площади проёмов</text><rect x="368" y="438" width="300" height="144" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="462" style="font-size:15.5px;font-weight:700">Ограждение · U, R</text><line x1="378" y1="472" x2="658" y2="472" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="491" class="ln">R₀ = R_si+Σ(d/λ)+R_se; U=1/R₀</text><text x="380" y="511" class="ln">ψ, χ → bridgeFactor</text><text x="380" y="531" class="ln">R_пр приведённое</text><rect x="368" y="602" width="300" height="104" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="626" style="font-size:15.5px;font-weight:700">Солнце</text><line x1="378" y1="636" x2="658" y2="636" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="655" class="ln">положение: высота, азимут</text><text x="380" y="675" class="ln">доступ фасада → q_сол</text><rect x="368" y="726" width="300" height="130" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="750" style="font-size:15.5px;font-weight:700">Контекст сетей</text><line x1="378" y1="760" x2="658" y2="760" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="779" class="ln">мощность приборов</text><text x="380" y="799" class="ln">поступления: люди/техника/трубы</text><text x="380" y="819" class="ln">приток мех. вентиляции, t_прит</text><rect x="368" y="876" width="300" height="104" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="380" y="900" style="font-size:15.5px;font-weight:700">Инфильтрация</text><line x1="378" y1="910" x2="658" y2="910" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="380" y="929" class="ln">Δp = ветер + гравитация</text><text x="380" y="949" class="ln">→ ACH → проводимость</text><rect x="716" y="300" width="246" height="250" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="728" y="324" style="font-size:15.5px;font-weight:700">Тепловая модель</text><line x1="726" y1="334" x2="952" y2="334" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="728" y="353" class="ln">зоны: C = ρ·V·c_p·k_m</text><text x="728" y="373" class="ln">G_инф, G_вент·(1−k_ef)</text><text x="728" y="393" class="ln">связи Вт/К: U·A ×bridgeFactor</text><text x="728" y="413" class="ln">кровля U·A, пол ×0.4</text><text x="728" y="433" class="ln">межэтажные перекрытия</text><text x="728" y="453" class="ln">UA зоны = Σ U·A</text><rect x="1010" y="188" width="430" height="196" fill="#ffffff" stroke="#161616" stroke-width="2.2"/><text x="1022" y="212" style="font-size:15.5px;font-weight:700">А · RC-солвер (динамика / стационар)</text><line x1="1020" y1="222" x2="1430" y2="222" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1022" y="241" class="sln">1. старт T — пассивный баланс зоны</text><text x="1022" y="259" class="sln">2. итерация ×12: T = Σ(Q+UA·T_сосед)/ΣUA</text><text x="1022" y="277" class="sln">3. отопление Q=(T_уст−T)·ΣUA ≤ мощн. приб.</text><text x="1022" y="295" class="sln">4. баланс зоны: T_возд, потери, Q_отоп</text><text x="1022" y="313" class="sln">5. поле (5-точ.) · 1D FTCS, Fo ≤ 0.5</text><rect x="1010" y="436" width="430" height="282" fill="#ffffff" stroke="#161616" stroke-width="2.2"/><text x="1022" y="460" style="font-size:15.5px;font-weight:700">Б · Нормативный контур СП 50</text><line x1="1020" y1="470" x2="1430" y2="470" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1022" y="489" class="sln">1. R_пр = 1/(Σφ/R + Σψ·l + Σχ·n)</text><text x="1022" y="507" class="sln">2. k_ob = Σ(n_t·A / R_пр) / V_от</text><text x="1022" y="525" class="sln">3. n_возд, k_vent (рекуперация k_ef)</text><text x="1022" y="543" class="sln">4. β = 1/(1 + ξ·n)</text><text x="1022" y="561" class="sln">5. q_быт = A·q_int/(V·ΔT)</text><text x="1022" y="579" class="sln">   q_сол = 11.6·I/(V·ГСОП)</text><text x="1022" y="597" class="sln">6. q_от = k_ob + k_vent − β(q_быт+q_сол)</text><text x="1022" y="615" class="sln">7. Q_год = 0.024·ГСОП·V·q_от → класс</text><rect x="1488" y="200" width="244" height="168" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="1500" y="224" style="font-size:15.5px;font-weight:700">Неопределённость</text><line x1="1498" y1="234" x2="1722" y2="234" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1500" y="253" class="ln">Монте-Карло: N прогонов</text><text x="1500" y="273" class="ln">μ, σ, ДИ ±z·σ/√N</text><text x="1500" y="293" class="ln">Morris μ*, Pearson/Spearman</text><text x="1500" y="313" class="ln">VaR / CVaR, перцентили</text><rect x="1488" y="452" width="244" height="158" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="1500" y="476" style="font-size:15.5px;font-weight:700">Калибровка</text><line x1="1498" y1="486" x2="1722" y2="486" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1500" y="505" class="ln">подбор параметров по замерам</text><text x="1500" y="525" class="ln">RMSE, MAPE, CVRMSE, MBE</text><text x="1500" y="545" class="ln">→ обратная связь в модель</text><rect x="1780" y="168" width="340" height="224" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="1792" y="192" style="font-size:15.5px;font-weight:700">Результаты / отчёты</text><line x1="1790" y1="202" x2="2110" y2="202" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1792" y="221" class="sln">энергопаспорт, отчёт СП 50</text><text x="1792" y="239" class="sln">класс энергоэффективности</text><text x="1792" y="257" class="sln">графики потерь, профили T</text><text x="1792" y="275" class="sln">структура баланса</text><text x="1792" y="293" class="sln">3D-поле температур · экспорт PDF/Word</text><rect x="1780" y="430" width="340" height="132" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="1792" y="454" style="font-size:15.5px;font-weight:700">Комфорт</text><line x1="1790" y1="464" x2="2110" y2="464" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1792" y="483" class="ln">оперативная T, MRT</text><text x="1792" y="503" class="ln">часы недогрева / перегрева</text><text x="1792" y="523" class="ln">вероятность дискомфорта</text><rect x="1780" y="600" width="340" height="158" fill="#ffffff" stroke="#161616" stroke-width="1.5"/><text x="1792" y="624" style="font-size:15.5px;font-weight:700">Экономика / экология</text><line x1="1790" y1="634" x2="2110" y2="634" stroke="#161616" stroke-width="0.8" opacity="0.3"/><text x="1792" y="653" class="ln">срок окупаемости (прост./дискон.)</text><text x="1792" y="673" class="ln">NPV, индекс рентабельности</text><text x="1792" y="693" class="ln">годовая экономия энергии</text><text x="1792" y="713" class="ln">углеродный след CO₂</text><polyline points="320,235 346,235 346,224 368,224" class="flow" marker-end="url(#ah)"/><polyline points="320,235 340,235 340,357 368,357" class="flow" marker-end="url(#ah)"/><polyline points="320,235 352,235 352,510 368,510" class="flow" marker-end="url(#ah)"/><polyline points="320,235 334,235 334,791 368,791" class="flow" marker-end="url(#ah)"/><polyline points="320,235 330,235 330